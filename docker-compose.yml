services:
  courierdb:
    build: .
    container_name: courierdb_server
    ports:
      - "8000:8000"
    volumes:
      # Maps the folder "flow_data" on your laptop to "/app/flow_data" in the container
      # This ensures your data survives if you delete the container!
      - ./flow_data:/app/flow_data
    environment:
      - COURIERDB_PATH=/app/flow_data
      # Optional: set this in your .env to enable API-key auth
      - COURIERDB_API_KEY=${COURIERDB_API_KEY}
    restart: unless-stopped
